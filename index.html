<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LINE LIFF Gateway</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root{
            --bg:#EEF1EF;
            --surface:#FFFFFF;
            --ink:#1E2A28;
            --ink-soft:#5B6B67;
            --line:#DCE3DF;
            --primary:#2F6F5E;
            --primary-dark:#234F43;
        }
        *{box-sizing:border-box;}
        body{
            margin:0;
            min-height:100vh;
            background:var(--bg);
            color:var(--ink);
            font-family:'Sarabun',sans-serif;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:24px;
        }
        .login-card{
            background:var(--surface);
            border:1px solid var(--line);
            border-radius:16px;
            padding:36px 30px;
            max-width:340px;
            width:100%;
            text-align:center;
            box-shadow:0 12px 30px rgba(0,0,0,.06);
        }
        .login-spinner{
            width:44px;height:44px;
            border-radius:50%;
            border:4px solid #E7EFEC;
            border-top-color:var(--primary);
            margin:0 auto 20px auto;
            animation:spin .8s linear infinite;
        }
        @keyframes spin{to{transform:rotate(360deg);}}
        .login-card h2{
            font-size:16px;
            font-weight:700;
            margin:0 0 8px 0;
        }
        .login-card p{
            font-size:13px;
            color:var(--ink-soft);
            margin:0;
            line-height:1.6;
        }
        .progress-track{
            width:100%;
            height:6px;
            background:#E7EFEC;
            border-radius:999px;
            overflow:hidden;
            margin-top:22px;
        }
        .progress-bar{
            height:100%;
            width:40%;
            background:var(--primary);
            border-radius:999px;
            animation:loadingSlide 1.2s ease-in-out infinite;
        }
        @keyframes loadingSlide{
            0%{transform:translateX(-120%);}
            100%{transform:translateX(280%);}
        }
        #retry-button{
            margin-top:18px;
            border:none;
            background:var(--primary);
            color:#fff;
            font-family:'Sarabun',sans-serif;
            font-weight:600;
            font-size:13.5px;
            padding:11px 20px;
            border-radius:8px;
            cursor:pointer;
        }
        #retry-button:active{transform:scale(.97);}
    </style>
</head>
<body>
    <div class="login-card">
        <div class="login-spinner"></div>
        <h2>กำลังเข้าสู่ระบบ</h2>
        <p id="status-text">กำลังเข้าสู่ระบบและตรวจสอบสิทธิ์...</p>
        <div class="progress-track"><div class="progress-bar"></div></div>
    </div>

    <script>
        const LIFF_ID = '2010633264-YTJe5dbM';
        // Apps Script Web App endpoint used for the gateway redirect
        const GAS_EXEC_URL = 'https://script.google.com/macros/s/AKfycbygj3YTzGbXXyXYZfju1AehGPD3OpQmZdz65hmGA6vGYGWWaZg7--pr1_JL8yt2lUD1/exec';

        const LOGIN_ATTEMPT_KEY = 'gateway-login-attempt';
        const LOGIN_RETRY_KEY = 'gateway-login-retry-count';

        function updateStatus(message) {
            const el = document.getElementById('status-text');
            if (el) {
                el.textContent = message;
            }
        }

        function getRetryCount() {
            return Number(sessionStorage.getItem(LOGIN_RETRY_KEY) || '0');
        }

        function markLoginAttempt() {
            sessionStorage.setItem(LOGIN_ATTEMPT_KEY, '1');
            sessionStorage.setItem(LOGIN_RETRY_KEY, String(getRetryCount() + 1));
        }

        function clearLoginAttempt() {
            sessionStorage.removeItem(LOGIN_ATTEMPT_KEY);
            sessionStorage.removeItem(LOGIN_RETRY_KEY);
        }

        function showRetryButton(message) {
            updateStatus(message);
            // ซ่อน progress bar ตอนขึ้นปุ่มลองใหม่ เพราะไม่ใช่สถานะ "กำลังโหลด" แล้ว
            const track = document.querySelector('.progress-track');
            if (track) track.style.display = 'none';
            const spinner = document.querySelector('.login-spinner');
            if (spinner) spinner.style.display = 'none';
            if (!document.getElementById('retry-button')) {
                const button = document.createElement('button');
                button.id = 'retry-button';
                button.textContent = 'ลองเข้าสู่ระบบอีกครั้ง';
                button.onclick = function () {
                    clearLoginAttempt();
                    window.location.reload();
                };
                document.querySelector('.login-card').appendChild(button);
            }
        }

        function startLoginFlow(message) {
            const retryCount = getRetryCount();
            if (retryCount >= 2) {
                showRetryButton('การเข้าสู่ระบบไม่สำเร็จ กรุณาลองใหม่อีกครั้ง');
                return;
            }

            markLoginAttempt();
            updateStatus(message);
            try {
                const currentUrl = new URL(window.location.href);
                const destPage = getUrlParam('page') || 'user';
                currentUrl.searchParams.set('page', destPage);
                liff.login({ redirectUri: currentUrl.toString() });
            } catch (err) {
                showRetryButton('ไม่สามารถเริ่มการเข้าสู่ระบบ LINE ได้ กรุณาลองใหม่อีกครั้ง');
            }
        }

        // ฟังก์ชันดึง Query Parameter จาก URL
        function getUrlParam(name) {
            const results = new RegExp('[\\?&]' + name + '=([^&#]*)').exec(window.location.href);
            return results ? decodeURIComponent(results[1]) : null;
        }

        // ฟังก์ชันตรวจสอบว่า ID Token หมดอายุหรือยัง
        function isTokenExpired(token) {
            if (!token) return true;
            try {
                const base64Url = token.split('.')[1];
                const base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
                const jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                    return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
                }).join(''));

                const payload = JSON.parse(jsonPayload);
                const currentTime = Math.floor(Date.now() / 1000);

                return payload.exp ? (currentTime >= payload.exp) : true;
            } catch (e) {
                return true;
            }
        }

        function redirectToGas(idToken) {
            clearLoginAttempt();
            const destPage = getUrlParam('page') || 'user';
            const params = new URLSearchParams();
            params.set('page', destPage);
            params.set('idToken', idToken || '');

            const targetUrl = GAS_EXEC_URL + '?' + params.toString();
            window.location.replace(targetUrl);
        }

        liff.init({ liffId: LIFF_ID })
            .then(() => {
                const loginAttempted = sessionStorage.getItem(LOGIN_ATTEMPT_KEY) === '1';

                if (!liff.isLoggedIn()) {
                    if (loginAttempted) {
                        updateStatus('กำลังรอการเข้าสู่ระบบจาก LINE... หากไม่เปลี่ยนแปลงให้กดปุ่มด้านล่าง');
                    } else {
                        startLoginFlow('กำลังเปิดหน้าเข้าสู่ระบบ LINE...');
                    }
                    return;
                }

                const idToken = liff.getIDToken();
                if (!idToken || isTokenExpired(idToken)) {
                    startLoginFlow('เซสชันเดิมหมดอายุ กำลังรีเฟรชข้อมูลล็อกอินใหม่...');
                    return;
                }

                updateStatus('กำลังส่งต่อข้อมูลไปยังระบบ...');
                redirectToGas(idToken);
            })
            .catch((err) => {
                console.error('LIFF Initialization failed', err);
                showRetryButton('เกิดข้อผิดพลาดในการเชื่อมต่อ LINE กรุณาลองเปิดใหม่อีกครั้ง');
            });
    </script>
</body>
</html>
