<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>LINE LIFF Gateway</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
</head>
<body>
    <p>กำลังเข้าสู่ระบบ...</p>

    <script>
        const LIFF_ID = '2010633264-YTJe5dbM'; // ใส่ LIFF ID เต็มของคุณตรงนี้
        const GAS_EXEC_URL = 'https://raw.githubusercontent.com/rapeepron2540-ux/gateway/main/index.html'; // URL ของ Apps Script

        // ฟังก์ชันดึง Query Parameter จาก URL ของ Gateway เอง (เพื่อส่งต่อหน้า page ไปให้ GAS)
        function getUrlParam(name) {
            const results = new RegExp('[\?&]' + name + '=([^&#]*)').exec(window.location.href);
            return results ? Object.assign(results)[1] : null;
        }

        liff.init({ liffId: LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    // ดึง ID Token ที่ได้จากการ Login สำเร็จ (เป็นค่า JWT ที่ปลอมแปลงไม่ได้)
                    const idToken = liff.getIDToken();
                    const destPage = getUrlParam('page') || 'user'; // ถ้าไม่ได้ส่งหน้ามา ให้ default ไป user
                    
                    // ส่ง idToken ไปที่ Apps Script ผ่าน URL Parameter
                    const targetUrl = GAS_EXEC_URL + '?page=' + destPage + '&idToken=' + encodeURIComponent(idToken);
                    window.location.href = targetUrl;
                }
            })
            .catch((err) => {
                console.error('LIFF Initialization failed', err);
                document.body.innerHTML = '<p>เกิดข้อผิดพลาดในการเชื่อมต่อ LINE</p>';
            });
    </script>
</body>
</html>
