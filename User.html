<!DOCTYPE html>
<html lang="th">
<head>
<base target="_top">
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Sarabun:wght@400;500;600;700&family=IBM+Plex+Mono:wght@500;600&display=swap" rel="stylesheet">
<!-- ตัดสคริปต์ LIFF SDK ออกเพื่อเข้าสู่ระบบผ่านเซิร์ฟเวอร์โดยตรง -->
<style>
  :root{
    --bg:#EEF1EF;
    --surface:#FFFFFF;
    --ink:#1E2A28;
    --ink-soft:#5B6B67;
    --line:#DCE3DF;
    --primary:#2F6F5E;
    --primary-dark:#234F43;
    --primary-tint:#E7EFEC;
    --warn-accent:#C97A3D;
    --warn-bg:#FBF0DF;
    --warn-ink:#8A5A20;
    --danger-accent:#B23A3A;
    --danger-bg:#FBE7E5;
    --danger-ink:#8C2E2E;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    background:var(--bg);
    color:var(--ink);
    font-family:'Sarabun',sans-serif;
    font-size:14px;
    padding-bottom:96px; /* กันปุ่มล่างบัง */
  }
  .topbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:16px 18px;background:var(--surface);border-bottom:1px solid var(--line);
    position:sticky;top:0;z-index:20;
  }
  .brand{display:flex;align-items:center;gap:10px;}
  .brand .mark{
    width:30px;height:30px;border-radius:8px;background:var(--primary);
    display:flex;align-items:center;justify-content:center;color:#fff;
    font-family:'IBM Plex Mono',monospace;font-weight:600;font-size:12px;
  }
  .brand h1{font-family:'Chakra Petch',sans-serif;font-size:16px;margin:0;}
  .who{
    text-align:right;font-size:11.5px;color:var(--ink-soft);
  }
  .who b{color:var(--ink);font-size:12.5px;display:block;}
  .who a{color:var(--primary);font-weight:600;cursor:pointer;text-decoration:none;}
  .who .unlink-link{color:var(--danger-ink);}

  .section{margin:14px 14px 0 14px;}
  .card{
    background:var(--surface);border:1px solid var(--line);border-radius:12px;padding:14px;
  }
  .filters{display:flex;gap:8px;}
  .filters select{flex:0 0 120px;}
  .filters input{flex:1;}
  select, input[type=text]{
    padding:10px 11px;border:1px solid var(--line);border-radius:8px;
    font-family:'Sarabun',sans-serif;font-size:13.5px;background:#fff;width:100%;
  }
  select:focus, input:focus{outline:2px solid var(--primary);outline-offset:1px;}

  .section-title{
    font-family:'Chakra Petch',sans-serif;font-size:13px;font-weight:600;
    color:var(--ink-soft);text-transform:uppercase;letter-spacing:.04em;
    margin:16px 2px 8px 2px;display:flex;justify-content:space-between;align-items:center;
  }
  .item-list{display:flex;flex-direction:column;gap:8px;}
  .item-row{
    background:var(--surface);border:1px solid var(--line);border-radius:10px;
    padding:11px 12px;display:flex;align-items:center;gap:10px;
  }
  .item-info{flex:1;min-width:0;}
  .item-name{font-weight:600;font-size:13.5px;}
  .item-name .en{color:var(--ink-soft);font-weight:400;font-size:12px;}
  .item-meta{font-size:11.5px;color:var(--ink-soft);margin-top:3px;display:flex;gap:8px;flex-wrap:wrap;}
  .item-meta .barcode{font-family:'IBM Plex Mono',monospace;background:#F2F5F3;padding:1px 6px;border-radius:4px;}
  .stock-badge{
    font-size:11px;font-weight:700;padding:2px 8px;border-radius:999px;
    background:var(--primary-tint);color:var(--primary-dark);
  }
  .stock-badge.low{background:var(--warn-bg);color:var(--warn-ink);}
  .stock-badge.out{background:var(--danger-bg);color:var(--danger-ink);}
  .add-btn{
    border:none;background:var(--primary);color:#fff;width:34px;height:34px;border-radius:9px;
    font-size:18px;cursor:pointer;flex:0 0 auto;
  }
  .add-btn:disabled{background:#C7CFCB;cursor:not-allowed;}
  .add-btn:active{transform:scale(.92);}

  .cart-card{border:1.5px solid var(--primary);}
  .cart-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
  .cart-header .count{font-family:'Chakra Petch',sans-serif;font-weight:600;font-size:14px;}
  .bin-btn{background:none;border:none;color:var(--danger-ink);font-size:12.5px;font-weight:600;cursor:pointer;padding:4px 6px;}
  .cart-empty{text-align:center;color:var(--ink-soft);font-size:13px;padding:20px 0;}
  .cart-row{
    display:flex;align-items:center;gap:8px;padding:9px 0;border-bottom:1px dashed var(--line);
  }
  .cart-row:last-child{border-bottom:none;}
  .cart-row .info{flex:1;min-width:0;}
  .cart-row .name{font-weight:600;font-size:13px;}
  .cart-row .sub{font-size:11px;color:var(--ink-soft);}
  .stepper{display:flex;align-items:center;gap:6px;}
  .stepper button{
    width:26px;height:26px;border-radius:7px;border:1px solid var(--line);background:#fff;
    font-size:15px;cursor:pointer;line-height:1;
  }
  .stepper span{min-width:20px;text-align:center;font-family:'IBM Plex Mono',monospace;font-weight:600;}
  .remove-x{background:none;border:none;color:var(--ink-soft);font-size:16px;cursor:pointer;padding:2px 4px;}
  .remove-x:hover{color:var(--danger-ink);}

  .footer-bar{
    position:fixed;bottom:0;left:0;right:0;
    background:var(--surface);border-top:1px solid var(--line);
    padding:12px 14px;display:flex;gap:10px;z-index:30;
  }
  .btn{
    border:none;border-radius:9px;padding:13px 16px;font-family:'Sarabun',sans-serif;
    font-weight:600;font-size:14px;cursor:pointer;flex:1;
  }
  .btn:active{transform:scale(.98);}
  .btn-primary{background:var(--primary);color:#fff;}
  .btn-primary:disabled{background:#C7CFCB;cursor:not-allowed;}
  .btn-ghost{background:#fff;color:var(--ink-soft);border:1px solid var(--line);flex:0 0 110px;}

  .empty-state{text-align:center;color:var(--ink-soft);padding:30px 10px;font-size:13px;}

  /* Overlay / modal */
  .overlay{
    display:none;position:fixed;inset:0;background:rgba(20,28,26,.5);
    align-items:center;justify-content:center;padding:20px;z-index:50;
  }
  .overlay.open{display:flex;}
  .modal{background:#fff;border-radius:14px;padding:24px 22px;width:100%;max-width:380px;text-align:center;}
  .modal.left{text-align:left;}
  .modal h2{font-family:'Chakra Petch',sans-serif;font-size:17px;margin:0 0 6px 0;}
  .modal p{color:var(--ink-soft);font-size:13px;margin:0 0 16px 0;}
  .modal input{margin-bottom:10px;}
  .success-icon{
    width:52px;height:52px;border-radius:50%;background:var(--primary-tint);color:var(--primary);
    display:flex;align-items:center;justify-content:center;font-size:26px;margin:0 auto 14px auto;
  }
  .timestamp{
    font-family:'IBM Plex Mono',monospace;font-size:12.5px;background:#F2F5F3;
    border-radius:7px;padding:8px;color:var(--ink-soft);margin-bottom:16px;
  }
  .field-error{color:var(--danger-ink);font-size:12px;margin:-4px 0 10px 0;display:none;text-align:left;}
  .spin{
    display:inline-block;width:14px;height:14px;border-radius:50%;
    border:2px solid rgba(255,255,255,.4);border-top-color:#fff;
    animation:spin .7s linear infinite;vertical-align:-2px;margin-right:6px;
  }
  @keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <div class="mark">02</div>
    <h1>เบิกพัสดุ</h1>
  </div>
  <div class="who" id="whoBox">—</div>
</div>

<div class="section">
  <div class="card">
    <div class="filters">
      <select id="filterCategory"><option value="">ทุกหมวดหมู่</option></select>
      <input type="text" id="searchBox" placeholder="ค้นหาชื่อหรือรหัส...">
    </div>
  </div>
</div>

<div class="section">
  <div class="section-title"><span>รายการสินค้า</span><span id="resultCount" class="muted"></span></div>
  <div class="item-list" id="itemList">
    <div class="empty-state">กำลังตรวจสอบสิทธิ์ผ่าน LINE...</div>
  </div>
</div>

<div class="section">
  <div class="section-title">ตะกร้าของคุณ</div>
  <div class="card cart-card">
    <div class="cart-header">
      <span class="count" id="cartCount">0 รายการ</span>
      <button class="bin-btn" id="clearCartBtn">🗑 ลบทั้งหมด</button>
    </div>
    <div id="cartList"><div class="cart-empty">ยังไม่มีรายการในตะกร้า</div></div>
  </div>
</div>

<div class="footer-bar">
  <button class="btn btn-ghost" id="backBtn">ย้อนกลับ</button>
  <button class="btn btn-primary" id="saveBtn" disabled>บันทึกรายการเบิก</button>
</div>

<!-- Registration modal: ขึ้นเฉพาะตอนลงทะเบียนครั้งแรก หรือกด "เปลี่ยนชื่อ" -->
<div class="overlay" id="regOverlay">
  <div class="modal left">
    <h2>ยืนยันชื่อผู้เบิก</h2>
    <p>เข้าสู่ระบบผ่าน LINE เรียบร้อย กรุณายืนยัน/แก้ไขชื่อที่จะใช้แสดงในระบบเบิกพัสดุ</p>
    <label style="font-size:12px;font-weight:600;color:var(--ink-soft);">ชื่อ-นามสกุล</label>
    <input type="text" id="regName" placeholder="เช่น สมชาย ใจดี">
    <div class="field-error" id="regError">กรุณากรอกชื่อ</div>
    <button class="btn btn-primary" id="regSaveBtn" style="width:100%;">เริ่มใช้งาน</button>
  </div>
</div>

<!-- Success / cancel popup -->
<div class="overlay" id="resultOverlay">
  <div class="modal">
    <div class="success-icon" id="resultIcon">✓</div>
    <h2 id="resultTitle">เบิกสำเร็จ</h2>
    <div class="timestamp" id="resultTime"></div>
    <button class="btn btn-primary" id="resultCloseBtn" style="width:100%;">ปิด</button>
  </div>
</div>

<script>
// ------------------------------------------------------------------
// CONFIG (รับค่าโดยตรงจาก Apps Script HTML Template ผ่านระบบ Gateway)
// ------------------------------------------------------------------
var SERVER_UID = "<?= verifiedUid ?>";
var SERVER_NAME = "<?= verifiedName ?>";
var SESSION_TOKEN = "<?= sessionToken ?>";

let ALL_ITEMS = [];
let CART = {}; // itemId -> qty
let PROFILE = null; // {uid, name}

function fmtDate(d){
  if(!d) return '';
  try{
    const dt = new Date(d);
    if(isNaN(dt.getTime())) return String(d);
    return dt.toISOString().slice(0,10);
  }catch(e){ return String(d); }
}

function setStatus(msg){
  const el = document.getElementById('itemList');
  if(el) el.innerHTML = '<div class="empty-state">'+msg+'</div>';
}

function showRetry(msg){
  const el = document.getElementById('itemList');
  if(el) el.innerHTML =
    '<div class="empty-state">'+msg+'<br><br>' +
    '<button class="btn btn-primary" style="width:auto;padding:10px 20px;" onclick="location.reload()">ลองใหม่อีกครั้ง</button></div>';
}

function authenticate(){
  setStatus('กำลังยืนยันตัวตนกับระบบหลังบ้าน...');
  try {
    if(SERVER_UID && SERVER_UID !== "null" && SERVER_UID !== ""){
      // เคสที่ 1: ผูกบัญชีแล้ว มีชื่อในฐานข้อมูลอยู่แล้ว
      if(SERVER_NAME && SERVER_NAME !== "null" && SERVER_NAME !== ""){
        PROFILE = { uid: SERVER_UID, name: SERVER_NAME };
        renderWho();
        afterAuthReady();
      } else {
        // เคสที่ 2: เป็นการเข้าครั้งแรก ผ่าน Gateway มาแต่ยังไม่เคยลงทะเบียนชื่อ
        document.getElementById('regName').value = '';
        document.getElementById('regOverlay').classList.add('open');
      }
    } else {
      showRetry('❌ ไม่พบข้อมูลการยืนยันตัวตน LINE (UID เป็นค่าว่าง) กรุณาเข้าใช้งานผ่าน LINE App เท่านั้น');
    }
  } catch(e) {
    showRetry('เกิดข้อผิดพลาดในขั้นตอน Authenticate: ' + e.message);
  }
}

function renderWho(){
  document.getElementById('whoBox').innerHTML =
    '<b>'+PROFILE.name+'</b>' +
    '<a onclick="openReg()">เปลี่ยนชื่อ</a> · ' +
    '<a class="unlink-link" onclick="doUnlink()">ยกเลิกผูกบัญชี</a>';
}

function openReg(){
  document.getElementById('regName').value = PROFILE ? PROFILE.name : '';
  document.getElementById('regOverlay').classList.add('open');
}

document.getElementById('regSaveBtn').addEventListener('click', ()=>{
  const name = document.getElementById('regName').value.trim();
  if(!name){
    document.getElementById('regError').style.display='block';
    return;
  }
  document.getElementById('regError').style.display='none';

  const uid = PROFILE ? PROFILE.uid : SERVER_UID;
  const btn = document.getElementById('regSaveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>กำลังบันทึก...';

  google.script.run.withSuccessHandler(serverProfile=>{
    btn.disabled = false;
    btn.textContent = 'เริ่มใช้งาน';
    const isFirstTime = !PROFILE;
    PROFILE = { uid, name: serverProfile.Name };
    document.getElementById('regOverlay').classList.remove('open');
    renderWho();
    if(isFirstTime) afterAuthReady();
  }).withFailureHandler(err=>{
    btn.disabled = false;
    btn.textContent = 'เริ่มใช้งาน';
    document.getElementById('regError').textContent = err.message || String(err);
    document.getElementById('regError').style.display='block';
  }).registerUser(SESSION_TOKEN, name);
});

function doUnlink(){
  if(!PROFILE) return;
  if(!confirm('ยืนยันยกเลิกการผูกบัญชี LINE นี้กับระบบเบิกพัสดุ?\nครั้งถัดไปที่เข้าใช้งานจะต้องลงทะเบียนชื่อใหม่อีกครั้ง (ประวัติการเบิกเก่ายังคงอยู่)')) return;

  google.script.run.withSuccessHandler(()=>{
    alert('ยกเลิกการผูกบัญชีเรียบร้อยแล้ว');
    window.location.reload();
  }).withFailureHandler(err=>{
    alert('ยกเลิกไม่สำเร็จ: '+(err.message||err));
  }).unlinkUser(SESSION_TOKEN);
}

// ------------------------------------------------------------------
// โหลดข้อมูลสินค้า
// ------------------------------------------------------------------
function afterAuthReady(){
  google.script.run.withSuccessHandler(cats=>{
    const sel = document.getElementById('filterCategory');
    cats.forEach(c => sel.insertAdjacentHTML('beforeend', `<option value="${c}">${c}</option>`));
  }).getCategories();
  loadItems();
}

function loadItems(){
  document.getElementById('itemList').innerHTML = '<div class="empty-state">กำลังโหลดข้อมูล...</div>';
  google.script.run.withSuccessHandler(items=>{
    const normalizedItems = Array.isArray(items)
      ? items
      : (items && Array.isArray(items.items) ? items.items : []);

    if(!Array.isArray(normalizedItems)){
      var debugInfo = 'typeof=' + typeof items + ' | JSON=' + JSON.stringify(items);
      document.getElementById('itemList').innerHTML = '<div class="empty-state">โหลดข้อมูลไม่สำเร็จ (เซิร์ฟเวอร์ส่งข้อมูลรูปแบบไม่ถูกต้อง)<br><br><span style="font-size:10px;word-break:break-all;display:block;text-align:left;background:#F2F5F3;padding:8px;border-radius:6px;">'+debugInfo+'</span></div>';
      return;
    }

    ALL_ITEMS = normalizedItems;
    renderItems();
  }).withFailureHandler(err=>{
    document.getElementById('itemList').innerHTML = '<div class="empty-state">โหลดข้อมูลไม่สำเร็จ: '+(err && err.message ? err.message : String(err))+'</div>';
  }).getItemsForUser();
}

function stockClass(stock){
  if(stock <= 0) return 'out';
  return '';
}

function renderItems(){
  const cat = document.getElementById('filterCategory').value;
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const rows = ALL_ITEMS.filter(it=>{
    if(cat && it.Category !== cat) return false;
    if(q){
      const hay = (it.BaseCode+' '+it.Name_TH+' '+it.Name_EN).toLowerCase();
      if(hay.indexOf(q)===-1) return false;
    }
    return true;
  });
  document.getElementById('resultCount').textContent = rows.length + ' รายการ';

  const list = document.getElementById('itemList');
  if(rows.length===0){
    list.innerHTML = '<div class="empty-state">ไม่พบสินค้าที่ค้นหา</div>';
    return;
  }
  list.innerHTML = rows.map(it=>{
    const stock = Number(it.CurrentStock)||0;
    const disabled = stock<=0 ? 'disabled' : '';
    const lotInfo = it.ActiveLotLabel ? 'ล็อตปัจจุบัน: '+it.ActiveLotLabel + (it.ActiveLotReceivedDate ? ' · รับเข้า '+fmtDate(it.ActiveLotReceivedDate) : '') : '';
    return `
    <div class="item-row">
      <div class="item-info">
        <div class="item-name">${it.Name_TH||it.Name_EN} ${it.Name_EN?'<span class="en">/ '+it.Name_EN+'</span>':''}</div>
        <div class="item-meta">
          <span class="barcode">${it.BaseCode}</span>
          <span>${it.Location||'-'} · ${it.Shelf||'-'}</span>
          <span class="stock-badge ${stockClass(stock)}">${stock} ${it.Unit||''}</span>
        </div>
        ${lotInfo ? '<div class="item-meta"><span class="muted">'+lotInfo+'</span></div>' : ''}
      </div>
      <button class="add-btn" ${disabled} onclick="addToCart('${it.BaseCode}')">+</button>
    </div>`;
  }).join('');
}

document.getElementById('filterCategory').addEventListener('change', renderItems);
document.getElementById('searchBox').addEventListener('input', renderItems);

function addToCart(baseCode){
  const it = ALL_ITEMS.find(x=>x.BaseCode===baseCode);
  if(!it) return;
  const current = CART[baseCode] || 0;
  if(current + 1 > Number(it.CurrentStock)){
    showResult(false, 'ของไม่พอเบิก', it.Name_TH + ' คงเหลือ ' + it.CurrentStock + ' ' + it.Unit);
    return;
  }
  CART[baseCode] = current + 1;
  renderCart();
}

function changeQty(baseCode, delta){
  const it = ALL_ITEMS.find(x=>x.BaseCode===baseCode);
  const next = (CART[baseCode]||0) + delta;
  if(next <= 0){ delete CART[baseCode]; renderCart(); return; }
  if(it && next > Number(it.CurrentStock)) return;
  CART[baseCode] = next;
  renderCart();
}

function removeFromCart(baseCode){
  delete CART[baseCode];
  renderCart();
}

document.getElementById('clearCartBtn').addEventListener('click', ()=>{
  CART = {};
  renderCart();
});

function renderCart(){
  const ids = Object.keys(CART);
  document.getElementById('cartCount').textContent = ids.length + ' รายการ';
  document.getElementById('saveBtn').disabled = ids.length === 0;

  const wrap = document.getElementById('cartList');
  if(ids.length===0){
    wrap.innerHTML = '<div class="cart-empty">ยังไม่มีรายการในตะกร้า</div>';
    return;
  }
  wrap.innerHTML = ids.map(id=>{
    const it = ALL_ITEMS.find(x=>x.BaseCode===id);
    if(!it) return '';
    return `
    <div class="cart-row">
      <div class="info">
        <div class="name">${it.Name_TH||it.Name_EN}</div>
        <div class="sub">${it.BaseCode} · ${it.Location||'-'}</div>
      </div>
      <div class="stepper">
        <button onclick="changeQty('${id}',-1)">−</button>
        <span>${CART[id]}</span>
        <button onclick="changeQty('${id}',1)">+</button>
      </div>
      <button class="remove-x" onclick="removeFromCart('${id}')">✕</button>
    </div>`;
  }).join('');
}

document.getElementById('backBtn').addEventListener('click', ()=>{
  if(Object.keys(CART).length===0) return;
  if(confirm('ล้างรายการในตะกร้าทั้งหมดและย้อนกลับ?')){
    CART = {};
    renderCart();
    window.scrollTo({top:0, behavior:'smooth'});
  }
});

function showResult(success, title, timeText){
  document.getElementById('resultIcon').textContent = success ? '✓' : '!';
  document.getElementById('resultIcon').style.background = success ? 'var(--primary-tint)' : 'var(--danger-bg)';
  document.getElementById('resultIcon').style.color = success ? 'var(--primary)' : 'var(--danger-ink)';
  document.getElementById('resultTitle').textContent = title;
  document.getElementById('resultTime').textContent = timeText;
  document.getElementById('resultOverlay').classList.add('open');
}
document.getElementById('resultCloseBtn').addEventListener('click', ()=>{
  document.getElementById('resultOverlay').classList.remove('open');
});

let RETRIED = false;
document.getElementById('saveBtn').addEventListener('click', ()=> doSubmit(false));

function doSubmit(isRetry){
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span>กำลังบันทึก...';

  const cartItems = Object.keys(CART).map(id=>({baseCode:id, qty:CART[id]}));

  google.script.run
    .withSuccessHandler(res=>{
      RETRIED = false;
      btn.disabled = false;
      btn.textContent = 'บันทึกรายการเบิก';
      CART = {};
      renderCart();
      loadItems();
      const dt = new Date(res.timestamp).toLocaleString('th-TH');
      showResult(true, 'เบิกสำเร็จ', dt);
    })
    .withFailureHandler(err=>{
      const msg = err.message || String(err);
      if(!isRetry && msg.indexOf('ผู้ใช้งานพร้อมกันจำนวนมาก') !== -1){
        setTimeout(()=> doSubmit(true), 1200);
        return;
      }
      btn.disabled = false;
      btn.textContent = 'บันทึกรายการเบิก';
      showResult(false, 'บันทึกไม่สำเร็จ', msg);
    })
    .submitRequisition(SESSION_TOKEN, cartItems);
}

// เริ่มต้นระบบยืนยันตัวตน
authenticate();
</script>
</body>
</html>
